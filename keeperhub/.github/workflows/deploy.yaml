on:
  push:
    branches:
      - staging
      - main
  workflow_dispatch:

name: deploy-keeperhub-mcp

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  build-and-deploy:
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'staging' }}
    runs-on: ubuntu-latest
    env:
      SERVICE_NAME: keeperhub-mcp
      NAMESPACE: keeperhub

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        if: ${{ !contains(github.event.head_commit.message, '[skip build]') }}
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: ${{ !contains(github.event.head_commit.message, '[skip build]') }}
        uses: docker/setup-buildx-action@v3

      - name: Extract commit hash and lowercase repo
        id: vars
        if: ${{ !contains(github.event.head_commit.message, '[skip build]') }}
        shell: bash
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "ghcr_repo=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Build, tag, and push image
        if: ${{ !contains(github.event.head_commit.message, '[skip build]') }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPO_NAME }}:${{ steps.vars.outputs.sha_short }}
            ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPO_NAME }}:latest
            ghcr.io/${{ steps.vars.outputs.ghcr_repo }}:${{ steps.vars.outputs.sha_short }}
            ghcr.io/${{ steps.vars.outputs.ghcr_repo }}:latest
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPO_NAME }}:cache
          cache-to: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPO_NAME }}:cache,mode=max

      - name: Replace variables in Helm values
        if: ${{ !contains(github.event.head_commit.message, '[skip deploy]') }}
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.vars.outputs.sha_short }}
        run: |
          sed -i 's|${ECR_REGISTRY}|'"$ECR_REGISTRY"'|g' ${{ vars.HELM_VALUES_PATH }}
          sed -i 's|${IMAGE_TAG}|'"$IMAGE_TAG"'|g' ${{ vars.HELM_VALUES_PATH }}

      - name: Deploy to Kubernetes with Helm
        if: ${{ !contains(github.event.head_commit.message, '[skip deploy]') }}
        uses: bitovi/github-actions-deploy-eks-helm@v1.2.10
        with:
          cluster-name: ${{ vars.EKS_CLUSTER_NAME }}
          config-files: ${{ vars.HELM_VALUES_PATH }}
          chart-path: techops-services/common
          namespace: ${{ env.NAMESPACE }}
          timeout: 5m0s
          name: ${{ env.SERVICE_NAME }}
          chart-repository: https://techops-services.github.io/helm-charts
          version: 0.2.1
          atomic: true

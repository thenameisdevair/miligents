version: "3.9"

services:

  bridge:
    build:
      context: ..
      dockerfile: docker/Dockerfile.bridge
    ports:
      - "3100:3100"
    env_file:
      - ../.env
    environment:
      - BRIDGE_PORT=3100
      - BRIDGE_URL=http://bridge:3100
    networks:
      - miligents-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3100/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  originator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.originator
    env_file:
      - ../.env
    expose:
      - "8001"
    environment:
      - STATE_DIR=/app/state
      - AXL_AGENT_ID=originator
      - BRIDGE_URL=http://bridge:3100
      - AXL_API_PORT=9002
      - SPECIALIST_PUBKEY=${SPECIALIST_PUBKEY:-}
      - EXECUTION_PUBKEY=${EXECUTION_PUBKEY:-}
    volumes:
      - ../axl/configs/node-config-originator.json:/app/axl/configs/node-config-originator.json
      - ../axl/configs/private-a.pem:/app/axl/configs/private-a.pem
      - originator-chroma:/app/chroma_data
      - state-data:/app/state
    networks:
      - miligents-net
    depends_on:
      bridge:
        condition: service_healthy

  specialist:
    build:
      context: ..
      dockerfile: docker/Dockerfile.specialist
    env_file:
      - ../.env
    expose:
      - "8002"
    environment:
      - STATE_DIR=/app/state
      - AXL_AGENT_ID=specialist
      - BRIDGE_URL=http://bridge:3100
      - AXL_API_PORT=9002
      - SPECIALIST_DOMAIN=${SPECIALIST_DOMAIN:-agentic trading}
    volumes:
      - ../axl/configs/node-config-specialist.json:/app/axl/configs/node-config-specialist.json
      - ../axl/configs/private-b.pem:/app/axl/configs/private-b.pem
      - specialist-chroma:/app/chroma_data
      - state-data:/app/state
    networks:
      - miligents-net
    depends_on:
      bridge:
        condition: service_healthy

  execution:
    build:
      context: ..
      dockerfile: docker/Dockerfile.execution
    env_file:
      - ../.env
    expose:
      - "8003"
    environment:
      - STATE_DIR=/app/state
      - AXL_AGENT_ID=execution
      - BRIDGE_URL=http://bridge:3100
      - AXL_API_PORT=9002
      - EXECUTION_STRATEGY=${EXECUTION_STRATEGY:-agentic trading}
      - KEEPERHUB_MCP_URL=http://keeperhub:3000
    volumes:
      - ../axl/configs/node-config-execution.json:/app/axl/configs/node-config-execution.json
      - ../axl/configs/private-c.pem:/app/axl/configs/private-c.pem
      - execution-chroma:/app/chroma_data
      - state-data:/app/state
    networks:
      - miligents-net
    depends_on:
      bridge:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8081:8080"
    env_file:
      - ../.env
    environment:
      - STATE_DIR=/app/state
      - BRIDGE_URL=http://bridge:3100
      - KEEPERHUB_MCP_URL=http://host.docker.internal:3001
    volumes:
      - state-data:/app/state
    networks:
      - miligents-net
    depends_on:
      bridge:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile.scheduler
    env_file:
      - ../.env
    environment:
      - STATE_DIR=/app/state
      - CYCLE_INTERVAL_MINUTES=${CYCLE_INTERVAL_MINUTES:-10}
      - AGENT_TIMEOUT_MINUTES=${AGENT_TIMEOUT_MINUTES:-15}
      - ORIGINATOR_URL=http://originator:8001
      - SPECIALIST_URL=http://specialist:8002
      - EXECUTION_URL=http://execution:8003
    volumes:
      - state-data:/app/state
    networks:
      - miligents-net
    depends_on:
      - originator
      - specialist
      - execution

  keeperhub:
    build:
      context: ../keeperhub
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      - PORT=3000
      - MCP_API_KEY=${KEEPERHUB_MCP_API_KEY:-miligents_local}
      - KEEPERHUB_API_URL=${KEEPERHUB_API_URL:-https://app.keeperhub.com}
    expose:
      - "3000"
    networks:
      - miligents-net
    restart: unless-stopped

networks:
  miligents-net:
    driver: bridge

volumes:
  state-data:
  originator-chroma:
  specialist-chroma:
  execution-chroma:
